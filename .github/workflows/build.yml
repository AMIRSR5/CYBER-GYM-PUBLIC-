name: Build Signed APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init & Add Android
        run: |
          npx cap init "CYBER GYM" "com.cybergym.app" --web-dir .
          npx cap add android

      - name: Set SDK 34
        run: |
          sed -i 's/targetSdk = .*/targetSdk = 34/' android/app/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = 34/' android/app/build.gradle

      - name: Build APK
        run: cd android && ./gradlew assembleRelease

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias cybergym -storepass cybergym123 -keypass cybergym123 -dname "CN=CYBER GYM"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks key.jks --ks-pass pass:cybergym123 --key-pass pass:cybergym123 --out cyber-gym-signed.apk android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cyber-gym-apk
          path: cyber-gym-signed.apk
